openapi: 3.0.3
info:
  title: OpenAI Chat Completions API
  description: OpenAI Chat Completions endpoint modeled after Trino's OpenAiClient
  version: 1.0.0
servers:
  - url: https://api.openai.com
security:
  - bearerAuth: []
paths:
  /v1/chat/completions:
    post:
      summary: Generate a chat completion
      operationId: generateCompletion
      tags:
        - openAi
      requestBody:
        description: Chat completion request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Chat completion response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    ChatRequest:
      type: object
      required:
        - model
        - messages
      properties:
        model:
          type: string
          description: ID of the model to use
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
          description: List of messages in the conversation
        seed:
          type: integer
          format: int32
          description: Seed for deterministic generation
    ChatMessage:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          description: The role of the message author (system, user, assistant)
        content:
          type: string
          description: The message content
    ChatResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the completion
        model:
          type: string
          description: Model used for the completion
        choices:
          type: array
          items:
            $ref: '#/components/schemas/ChatChoice'
        usage:
          $ref: '#/components/schemas/ChatUsage'
        service_tier:
          type: string
        system_fingerprint:
          type: string
    ChatChoice:
      type: object
      properties:
        message:
          $ref: '#/components/schemas/ChatChoiceMessage'
        index:
          type: integer
          format: int32
        finish_reason:
          type: string
    ChatChoiceMessage:
      type: object
      properties:
        content:
          type: string
        refusal:
          type: string
        role:
          type: string
    ChatUsage:
      type: object
      properties:
        prompt_tokens:
          type: integer
          format: int32
        completion_tokens:
          type: integer
          format: int32
        total_tokens:
          type: integer
          format: int32
